<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>All Films List</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Outfit:wght@100..900&family=Roboto:ital,wght@0,100..900;1,100..900&display=swap"
      rel="stylesheet"
    />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: {
              roboto: ["Roboto", "sans-serif"],
              outfit: ["Outfit", "sans-serif"],
            },
          },
        },
      };
    </script>
    <!-- <link rel="stylesheet" href="/styles/tailwindcss.css" /> -->
     <script src="/js/main.js" defer></script>
  </head>
  <body class="bg-gray-950 text-white min-h-screen w-full overflow-x-hidden">
    <header
      class="border-b border-green-400 w-full px-4 sm:px-16 lg:px-40 py-4 flex justify-between"
    >
      <a href="index.html" class="logo flex items-center gap-2 cursor-pointer">
        <img class="w-[24px]" src="/assets/movielogo.svg" alt="movie-logo" />
        <p class="font-outfit text-sm font-semibold text-green-400">
          MOVIESPACE
        </p>
      </a>
      <div class="menu flex items-center gap-3">
        <a href="index.html"
          class="bg-gray-950 px-4 py-1 rounded-full font-roboto text-sm font-medium cursor-pointer hover:bg-gray-600"
        >
          ALL FILM
        </a>
        <button
          class="bg-gray-950 px-4 py-1 rounded-full font-roboto text-sm font-medium cursor-pointer hover:bg-gray-600"
        >
          MY WATCHLIST
        </button>
        <a href="/pages/loginView.html"
          class="bg-green-400 px-2 py-2 rounded-full font-roboto text-black text-sm font-medium cursor-pointer hover:bg-green-300"
        >
          <img class="w-[16px]" src="/assets/VJ.svg" alt="profile-i">
      </a>
      </div>
    </header>

    <section class="px-8 sm:px-16 lg:px-40 py-2 sm:py-4">
        <div >
            <h1 class="font-roboto text-2xl sm:text-3xl lg:text-4xl font-semibold mt-4">All Films (100)</h1>

            <div class="flex gap-2 sm:gap-4 mt-4 sm:mt-8">
                <button class="flex font-roboto text-xs sm:text-sm font-medium border border-white rounded-full px-2 sm:px-3 py-1">GENRE</button>
                <button class="flex font-roboto text-xs sm:text-sm font-medium border border-white rounded-full px-2 sm:px-3 py-1">SORT BY IMDB <img src="./assets/swap_vert.svg" alt="sort-icon" class="w-4 h-4"></button>
            </div>
        </div>

        <div id="movie-list" class="text-white "></div>
        <div id="pagination"></div>
    </section>

  </body>
</html>
