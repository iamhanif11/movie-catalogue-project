<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sign Up View</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Outfit:wght@100..900&family=Roboto:ital,wght@0,100..900;1,100..900&display=swap"
      rel="stylesheet"
    />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: {
              roboto: ["Roboto", "sans-serif"],
              outfit: ["Outfit", "sans-serif"],
            },
          },
        },
      };
    </script>
    <!-- <link rel="stylesheet" href="/styles/tailwindcss.css" /> -->
    <script src="/js/register.js" defer></script>
  </head>
  <body class="bg-gray-950 text-white min-h-screen w-full overflow-x-hidden">
    <header
      class="border-b border-green-400 w-full px-40 py-4 flex justify-between"
    >
      <a href="/index.html" class="logo flex items-center gap-2 cursor-pointer">
        <img class="w-[24px]" src="/assets/movielogo.svg" alt="movie-logo" />
        <p class="font-outfit text-sm font-semibold text-green-400">
          MOVIESPACE
        </p>
      </a>
      <nav class="menu flex items-center gap-4">
        <a
          href="/index.html"
          class="bg-gray-950 px-4 py-1 rounded-full font-roboto text-sm font-medium cursor-pointer hover:bg-gray-600"
        >
          ALL FILM
        </a>
        <a
          href="/pages/loginView.html"
          class="bg-green-400 px-4 py-1 rounded-full font-roboto text-black text-sm font-medium cursor-pointer hover:bg-green-300"
        >
          LOGIN
        </a>
      </nav>
    </header>

    <main class="px-40 flex justify-center items-center min-h-[80vh]">
      <section class="flex flex-col items-center gap-2">
        <div id="logo" class="flex gap-2 space-y-8">
          <img class="w-[24px]" src="/assets/movielogo.svg" alt="movie-logo" />
          <p class="font-outfit text-sm font-semibold text-green-400">
            MOVIESPACE
          </p>
        </div>

        <form id="registerForm" class="w-[320px] flex flex-col">
          <div class="border-b border-white focus-within:border-green-400 ">
            <input
              type="text"
              name="email"
              id="email"
              placeholder="Email"
              class="bg-transparent outline-none font-roboto text-base font-normal py-2 placeholder-white"
            />
          </div>
          <p
            id="emailError"
            class="text-red-500 text-xs mt-1 mb-1 invisible"
          ></p>

          <div class="border-b focus-within:border-green-400">
            <input
              type="password"
              name="password"
              id="password"
              placeholder="Password"
              class="bg-transparent outline-none font-roboto text-base font-normal py-2 placeholder-white"
            />
          </div>
          <p
            id="passwordError"
            class="text-red-500 text-xs mt-1 mb-1 invisible"
          ></p>

          <div
            class="confirm-password border-b focus-within:border-green-400"
          >
            <input
              type="password"
              name="confirmPassword"
              id="confirmPassword"
              placeholder="Confirm Password"
              class="bg-transparent outline-none font-roboto text-base font-normal py-2 placeholder-white"
            />
          </div>
          <p
            id="confirmError"
            class="text-red-500 text-xs mt-1 mb-3 invisible"
          ></p>

          <button
            type="submit"
            class="self-center bg-green-400 text-black mt-8 text-sm font-medium px-8 py-2 rounded-full hover:bg-green-300 cursor-pointer"
          >
            SIGN UP
          </button>
        </form>
        <div class="flex gap-1 mt-4">
          <p class="font-roboto text-sm font-normal text-green-400">
            REGISTERED USER?
          </p>
          <a
            href="/pages/loginView.html"
            class="font-roboto text-sm font-normal text-green-400 cursor-pointer border-b border-green-400"
            >LOGIN HERE</a
          >
        </div>
      </section>
    </main>
  </body>
</html>
